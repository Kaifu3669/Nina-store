<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8" />

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>
Firebase Admin Panel
</title>

<link
href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet"
/>

<style>

*{
box-sizing:border-box;
}

body{

margin:0;
padding:30px;

background:
linear-gradient(
135deg,
#0f0f0f,
#181818,
#111
);

font-family:'Poppins',sans-serif;

color:white;

min-height:100vh;

display:none;

justify-content:center;

align-items:center;

}

.box{

width:100%;
max-width:500px;

background:
rgba(255,255,255,0.05);

backdrop-filter:blur(14px);

padding:35px;

border-radius:28px;

border:
1px solid rgba(
255,255,255,0.08
);

box-shadow:
0 20px 60px rgba(
0,0,0,0.5
);

}

h1{

text-align:center;

margin-bottom:30px;

font-size:38px;

}

input{

width:100%;

padding:16px;

margin-bottom:18px;

border:none;

outline:none;

border-radius:16px;

background:#1d1d1d;

color:white;

font-size:15px;

}

input::placeholder{

color:#777;

}

button{

width:100%;

padding:16px;

border:none;

border-radius:18px;

background:white;

color:black;

font-size:16px;

font-weight:600;

cursor:pointer;

transition:0.3s;

}

button:hover{

transform:translateY(-3px);

box-shadow:
0 10px 30px rgba(
255,255,255,0.2
);

}

.info{

margin-top:20px;

text-align:center;

color:#aaa;

font-size:14px;

line-height:1.7;

}

.denied{

width:100%;

text-align:center;

font-size:40px;

font-weight:700;

}

</style>

</head>

<body>

<div class="box">

<h1>
Firebase Admin 😏
</h1>

<input
type="text"
id="productName"
placeholder="Product Name"
/>

<input
type="text"
id="productPrice"
placeholder="Product Price"
/>

<input
type="text"
id="productImage"
placeholder="Image URL"
/>

<button onclick="saveProduct()">

Upload Product

</button>

<p class="info">

Products upload directly to Firebase 🔥

</p>

</div>

<script>

/* PASSWORD PROTECTION */

let password =
prompt(
"Enter Admin Password"
);

if(
password === null ||
password.trim() !== "Kaif3669"
){

document.body.style.display =
"flex";

document.body.innerHTML = `

<div class="denied">

Access Denied ❌

</div>

`;

throw new Error(
"Wrong Password"
);

}else{

document.body.style.display =
"flex";

}

</script>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {

getFirestore,
collection,
addDoc

}

from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

/* FIREBASE CONFIG */

const firebaseConfig = {

apiKey:
"AIzaSyDRwKRMybVwuEw6BKtnI98RBfy3eso8to8",

authDomain:
"nina-store-866c1.firebaseapp.com",

projectId:
"nina-store-866c1",

storageBucket:
"nina-store-866c1.firebasestorage.app",

messagingSenderId:
"113091256345",

appId:
"1:113091256345:web:dae299919cfd342e318a88",

measurementId:
"G-DH7TNBL6KG"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

/* SAVE PRODUCT */

window.saveProduct =
async function(){

let name =
document.getElementById(
"productName"
).value.trim();

let price =
document.getElementById(
"productPrice"
).value.trim();

let image =
document.getElementById(
"productImage"
).value.trim();

/* VALIDATION */

if(
!name ||
!price ||
!image
){

alert(
"Fill all fields 😏"
);

return;

}

/* IMAGE URL CHECK */

if(
!image.startsWith("http")
){

alert(
"Enter valid image URL ❌"
);

return;

}

try{

await addDoc(
collection(db,"products"),
{

name:name,
price:price,
image:image,
createdAt:Date.now()

}
);

alert(
"Product Uploaded Successfully 🔥"
);

/* CLEAR INPUTS */

document.getElementById(
"productName"
).value = "";

document.getElementById(
"productPrice"
).value = "";

document.getElementById(
"productImage"
).value = "";

}catch(error){

console.log(error);

alert(
"Upload Failed ❌\nCheck Firebase Rules"
);

}

};

</script>

</body>

</html>
