<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Checkout</title>

  <style>

    body{
      background:#111;
      color:white;
      font-family:Arial;
      padding:20px;
    }

    .box{
      max-width:400px;
      margin:auto;
      background:#1e1e1e;
      padding:20px;
      border-radius:20px;
    }

    input{
      width:100%;
      padding:12px;
      margin-top:10px;
      border:none;
      border-radius:10px;
    }

    button{
      width:100%;
      padding:14px;
      margin-top:15px;
      border:none;
      border-radius:10px;
      background:white;
      color:black;
      font-weight:bold;
    }

    img{
      width:100%;
      border-radius:20px;
      margin-top:20px;
    }

  </style>

</head>
<body>

<div class="box">

<h1>Checkout</h1>

<input type="text" placeholder="Full Name">

<input type="text" placeholder="Phone Number">

<input type="text" placeholder="Address">

<input type="text" placeholder="UTR Number (Required)">

<img src="qr.jpg" alt="QR Code">

<button>Submit Order</button>

</div>

</body>
</html>
