<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
>

<title>
Checkout | Nina Store
</title>

<link
rel="preconnect"
href="https://fonts.googleapis.com"
>

<link
rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin
>

<link
href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet"
>

<style>

*{
  box-sizing:border-box;
}

body{

  margin:0;

  background:
  linear-gradient(
    135deg,
    #0f0f0f,
    #1a1a1a,
    #111
  );

  color:white;

  font-family:'Poppins',sans-serif;

  min-height:100vh;

  display:flex;

  justify-content:center;

  align-items:center;

  padding:20px;

}

.box{

  width:100%;

  max-width:450px;

  background:
  rgba(255,255,255,0.05);

  backdrop-filter:blur(18px);

  border:
  1px solid rgba(
    255,255,255,0.08
  );

  border-radius:28px;

  padding:30px;

  box-shadow:
  0 20px 60px rgba(
    0,0,0,0.5
  );

}

h1{

  text-align:center;

  margin-top:0;

  margin-bottom:25px;

  font-size:38px;

}

input{

  width:100%;

  padding:15px;

  margin-top:14px;

  border:none;

  border-radius:14px;

  background:#1b1b1b;

  color:white;

  font-size:15px;

  outline:none;

}

input::placeholder{

  color:#888;

}

p{

  color:#bbb;

  line-height:1.7;

  margin-top:20px;

  text-align:center;

  font-size:14px;

}

img{

  width:100%;

  border-radius:20px;

  margin-top:20px;

  background:#111;

  padding:10px;

}

button{

  width:100%;

  padding:16px;

  margin-top:25px;

  border:none;

  border-radius:16px;

  background:white;

  color:black;

  font-size:16px;

  font-weight:600;

  cursor:pointer;

  transition:0.3s;

}

button:hover{

  transform:
  translateY(-2px);

  box-shadow:
  0 10px 30px rgba(
    255,255,255,0.2
  );

}

.note{

  margin-top:18px;

  text-align:center;

  color:#888;

  font-size:13px;

}

@media(max-width:768px){

.box{

  padding:24px;

}

h1{

  font-size:32px;

}

}

</style>

</head>

<body>

<div class="box">

<h1>
Checkout
</h1>

<form
action="https://api.web3forms.com/submit"
method="POST"
>

<input
type="hidden"
name="access_key"
value="a137d707-045f-4db9-ba5c-b8afc5368996"
>

<input
type="hidden"
name="redirect"
value="https://nina-store-mu.vercel.app/success.html"
>  
  
<input
type="text"
name="name"
placeholder="Full Name"
required
>

<input
type="text"
name="phone"
placeholder="Phone Number"
required
>

<input
type="text"
name="address"
placeholder="Address"
required
>

<input
type="tel"
name="pincode"
placeholder="PIN Code"
pattern="[0-9]{6}"
maxlength="6"
required
>

<input
type="text"
name="utr"
placeholder="UTR Number"
required
>

<input
type="hidden"
name="product"
id="productField"
>

<input
type="hidden"
name="price"
id="priceField"
>
  
<input
type="hidden"
name="delivery_charge"
value="50"
> 
  
<p>
After payment, enter your UTR number
to confirm your order.
</p>

<div id="orderSummary"></div> 
  
<img
src="qr.jpg"
alt="QR Code"
loading="lazy"
>

<button type="submit">

Submit Order

</button>

</form>

<div class="note">

Nina Store Secure Checkout 🔒

</div>

</div>

<script>

let cart =
JSON.parse(
localStorage.getItem("cart")
) || [];

let productNames = "";
let total = 0;
const deliveryCharge = 50;

cart.forEach(item => {

productNames += item.name + ", ";

let price =
parseInt(
String(item.price)
.replace(/[^0-9]/g,"")
);

total += price;

});

document.getElementById(
"productField"
).value = productNames || "No Product";

let grandTotal =
total + deliveryCharge;

document.getElementById(
"priceField"
).value = "₹" + grandTotal; 

document.getElementById(
"orderSummary"
).innerHTML = `
<p>Products Total: ₹${total}</p>
<p>Delivery Charges: ₹50</p>
<h3>Total Payable: ₹${grandTotal}</h3>
`;
  
</script>
  
</body>

</html>
