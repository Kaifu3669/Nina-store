<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Checkout</title>

<style>

body{
  background:#111;
  color:white;
  font-family:Arial;
  padding:20px;
}

.box{
  max-width:400px;
  margin:auto;
  background:#1e1e1e;
  padding:20px;
  border-radius:20px;
}

input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
}

button{
  width:100%;
  padding:14px;
  margin-top:15px;
  border:none;
  border-radius:10px;
  background:white;
  color:black;
  font-weight:bold;
}

img{
  width:100%;
  border-radius:20px;
  margin-top:20px;
}

</style>

</head>
<body>

<div class="box">

<h1>Checkout</h1>

<form action="https://api.web3forms.com/submit" method="POST">
"hidden"value="5d88181d-b93d-406d-821a-163c2bc4a0c8">
<input
type="text"
name="name"
placeholder="Full Name"
required
>

<input
type="text"
name="phone"
placeholder="Phone Number"
required
>

<input
type="text"
name="address"
placeholder="Address"
required
>

<input
type="text"
name="utr"
placeholder="UTR Number"
required
>

<input
type="hidden"
name="product"
value="Sennheiser AMBEO SMART HEADSET"
>

<input
type="hidden"
name="price"
value="₹20,000"
>

<p>
After payment, enter your UTR number to confirm your order.
</p>

<img
src="qr.jpg"
alt="QR Code"
loading="lazy"
>

<button type="submit">
Submit Order
</button>

</form>

</div>

</body>
</html>
