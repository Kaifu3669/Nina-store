<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Nina Store | Premium Audio Products</title>

  <link rel="icon" type="image/png" href="favicon.png" />

  <meta name="description" content="Premium audio products with luxury experience." />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css" />
</head>

<body>

<!-- NAVBAR -->
<header class="navbar">
  <div class="logo">Nina Store</div>

  <input
    type="text"
    id="searchInput"
    placeholder="Search premium audio..."
    onkeyup="searchProducts()"
  />

  <div class="nav-icons">
    <span>🛒</span>
  </div>
</header>

<!-- HERO SECTION -->
<section class="hero">
  <div class="hero-content">
    <h1>Feel Sound Differently</h1>
    <p>Premium audio experience with luxury aesthetics & modern design.</p>

    <button onclick="document.querySelector('#products').scrollIntoView({behavior:'smooth'})">
      Explore Products
    </button>
  </div>
</section>

<!-- FEATURES -->
<section class="features">
  <div class="feature">🎧 High Quality Sound</div>
  <div class="feature">🚚 Fast Delivery</div>
  <div class="feature">🔒 Secure Payments</div>
  <div class="feature">💎 Premium Build</div>
</section>

<!-- PRODUCTS -->
<section id="products" class="products-section">

  <h2>Featured Products</h2>

  <div class="product-grid">

    <!-- Example Card -->
    <div class="product-card">
      <img src="images/product1.jpg" alt="Headphones">
      <h3>Wireless Headphones</h3>
      <p>₹2,999</p>
      <button>Add to Cart</button>
    </div>

    <div class="product-card">
      <img src="images/product2.jpg" alt="Earbuds">
      <h3>Premium Earbuds</h3>
      <p>₹1,999</p>
      <button>Add to Cart</button>
    </div>

  </div>
</section>

<!-- FOOTER -->
<footer>
  <p>© 2026 Nina Store. All rights reserved.</p>
</footer>

<script src="script.js"></script>

</body>
</html>
