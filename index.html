<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
 <title>Nina Store | Premium Audio Products</title>
<link
rel="icon"
type="image/png"
href="favicon.png"
> 
<meta
name="description"
content="Buy premium audio products and accessories at Nina Store."
>

<meta
name="keywords"
content="headphones, earbuds, premium audio, nina store"
>

<meta
name="author"
content="Nina Store"
> 
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>

<nav class="navbar">

<h1>Nina Store</h1>

<input
type="text"
id="searchInput"
placeholder="Search products..."
onkeyup="searchProducts()"
/>

</nav>

<p>Soft aesthetic products</p>

  </header> 

  <section class="products">

    <div class="card">
  <img
src="headset.jpg"
alt="Sennheiser AMBEO SMART HEADSET"
loading="lazy"
> 

  <h2>Sennheiser AMBEO SMART HEADSET</h2>

  <p>₹20,000</p>

<button onclick="addToCart()">
  Add To Cart
</button>
    </div>
<div class="card">

<img
src="earbuds.jpg"
alt="Wireless Earbuds"
loading="lazy"
> 

  <h2>Wireless Earbuds</h2>

  <p>₹4,999</p>

  <button onclick="addToCart2()">
    Add To Cart
  </button>

</div> 
  </section>
<script>

function addToCart(){

  let product = {
    name:"Sennheiser AMBEO SMART HEADSET",
    price:"₹20,000"
  };

  localStorage.setItem(
    "cart",
    JSON.stringify(product)
  );

  alert("Product Added To Cart 😏");

  window.location.href = "cart.html";

}
function addToCart2(){

  let product = {
    name:"Wireless Earbuds",
    price:"₹4,999"
  };

  localStorage.setItem(
    "cart",
    JSON.stringify(product)
  );

  alert("Product Added To Cart 😏");

  window.location.href = "cart.html";

} 
function searchProducts(){

  let input =
  document.getElementById(
    "searchInput"
  ).value.toLowerCase();

  let cards =
  document.getElementsByClassName(
    "card"
  );

  for(let i=0;i<cards.length;i++){

    let title =
    cards[i]
    .getElementsByTagName(
      "h2"
    )[0];

    let text =
    title.innerText.toLowerCase();

    if(text.includes(input)){
      cards[i].style.display="block";
    }else{
      cards[i].style.display="none";
    }

  }

} 
</script> 
  <footer>

<p>
© 2026 Nina Store — All Rights Reserved
</p>

<a href="#">

</div>

  </footer> 
</body>
</html>
