<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
>

<title>
Cart | Nina Store
</title>

<link
rel="preconnect"
href="https://fonts.googleapis.com"
>

<link
rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin
>

<link
href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet"
>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{

  background:
  linear-gradient(
    135deg,
    #0f0f0f,
    #1a1a1a,
    #111
  );

  color:white;

  font-family:'Poppins',sans-serif;

  min-height:100vh;

  padding:40px 20px;

}

.cartBox{

  width:100%;

  max-width:780px;

  margin:auto;

  background:
  rgba(255,255,255,0.05);

  backdrop-filter:blur(20px);

  border:
  1px solid rgba(
    255,255,255,0.08
  );

  border-radius:32px;

  padding:35px;

  box-shadow:
  0 20px 60px rgba(
    0,0,0,0.5
  );

}

h1{

  font-size:46px;

  text-align:center;

  margin-bottom:30px;

  font-weight:700;

}

.product{

  background:
  linear-gradient(
    145deg,
    #181818,
    #101010
  );

  border-radius:28px;

  overflow:hidden;

  margin-bottom:30px;

  border:
  1px solid rgba(
    255,255,255,0.06
  );

}

/* FIXED IMAGE */

.product img{

  width:100%;

  height:340px;

  object-fit:contain;

  object-position:center;

  display:block;

  background:
  linear-gradient(
    145deg,
    #111,
    #1a1a1a
  );

  padding:30px;

}

.info{

  padding:25px;

}

.info h2{

  font-size:28px;

  margin-bottom:12px;

  line-height:1.3;

}

.price{

  color:#bdbdbd;

  font-size:20px;

  margin-bottom:18px;

}

.total{

  font-size:24px;

  font-weight:600;

  margin-bottom:25px;

}

.actions{

  display:flex;

  flex-direction:column;

  gap:15px;

}

.actions a,
.actions button{

  width:100%;

  border:none;

  text-decoration:none;

  text-align:center;

  padding:16px;

  border-radius:18px;

  font-size:16px;

  font-weight:600;

  cursor:pointer;

  transition:0.3s;

}

.actions a{

  background:white;

  color:black;

}

.removeBtn{

  background:#1f1f1f;

  color:white;

  border:
  1px solid rgba(
    255,255,255,0.08
  );

}

.actions a:hover,
.actions button:hover{

  transform:
  translateY(-2px);

}

.trust{

  margin-top:10px;

  text-align:center;

  color:#999;

  line-height:2;

  font-size:15px;

}

.grandTotal{

  margin-top:35px;

  padding:30px;

  border-radius:24px;

  background:
  rgba(255,255,255,0.04);

  text-align:center;

  border:
  1px solid rgba(
    255,255,255,0.06
  );

}

.grandTotal h2{

  font-size:34px;

  margin-bottom:10px;

}

.empty{

  text-align:center;

  padding:50px 20px;

}

.empty h2{

  font-size:38px;

  margin-bottom:10px;

}

.empty p{

  color:#999;

  line-height:1.8;

}

.shopBtn{

  display:inline-block;

  margin-top:25px;

  text-decoration:none;

  background:white;

  color:black;

  padding:15px 28px;

  border-radius:16px;

  font-weight:600;

}

/* MOBILE */

@media(max-width:768px){

body{
  padding:20px 14px;
}

.cartBox{
  padding:22px;
  border-radius:24px;
}

h1{
  font-size:34px;
}

.product img{

  height:260px;

  padding:20px;

}

.info{
  padding:20px;
}

.info h2{
  font-size:22px;
}

.price{
  font-size:18px;
}

.total{
  font-size:20px;
}

.actions a,
.actions button{

  padding:15px;

  border-radius:16px;

}

.grandTotal h2{
  font-size:28px;
}

}

</style>

</head>

<body>

<div class="cartBox">

<h1>
Your Cart
</h1>

<div id="cartContent">

</div>

</div>

<script>

/* GET CART */

let cart =
JSON.parse(
localStorage.getItem(
"cart"
)
) || [];

/* EMPTY CART */

if(cart.length === 0){

document.getElementById(
"cartContent"
).innerHTML = `

<div class="empty">

<h2>
Cart Is Empty 😔
</h2>

<p>
Looks like you haven't added anything yet.
</p>

<a
href="index.html"
class="shopBtn"
>
Continue Shopping
</a>

</div>

`;

}else{

renderCart();

}

/* RENDER CART */

function renderCart(){

let html = "";

let grandTotal = 0;

cart.forEach((item,index)=>{

let cleanPrice =
parseInt(
item.price.replace(
/[^0-9]/g,
""
)
);

grandTotal += cleanPrice;

html += `

<div class="product">

<img
src="${item.image}"
alt="${item.name}"
>

<div class="info">

<h2>
${item.name}
</h2>

<p class="price">
${item.price}
</p>

<div class="total">

Price:
₹${cleanPrice.toLocaleString()}

</div>

<div class="actions">

<a href="checkout.html">

Proceed To Checkout

</a>

<button
class="removeBtn"
onclick="removeCartItem(${index})"
>

Remove Product

</button>

</div>

</div>

</div>

`;

});

html += `

<div class="grandTotal">

<h2>
Grand Total:
₹${grandTotal.toLocaleString()}
</h2>

<div class="trust">

✔ Secure Checkout<br>

✔ Fast Delivery<br>

✔ Premium Packaging

</div>

</div>

`;

document.getElementById(
"cartContent"
).innerHTML = html;

}

/* REMOVE PRODUCT */

function removeCartItem(index){

cart.splice(index,1);

localStorage.setItem(
"cart",
JSON.stringify(cart)
);

if(cart.length === 0){

localStorage.removeItem(
"cart"
);

}

location.reload();

}

</script>

</body>

</html>
