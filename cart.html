<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
>

<title>
Cart | Nina Store
</title>

<link
rel="preconnect"
href="https://fonts.googleapis.com"
>

<link
rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin
>

<link
href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet"
>

<style>

body{

  margin:0;

  background:
  linear-gradient(
    135deg,
    #0f0f0f,
    #1a1a1a,
    #111
  );

  color:white;

  font-family:'Poppins',sans-serif;

  min-height:100vh;

  display:flex;

  justify-content:center;

  align-items:center;

  padding:20px;

  box-sizing:border-box;

}

.cartBox{

  width:100%;

  max-width:700px;

  background:
  rgba(255,255,255,0.05);

  backdrop-filter:blur(20px);

  border:
  1px solid rgba(
    255,255,255,0.08
  );

  border-radius:28px;

  padding:30px;

  box-sizing:border-box;

  box-shadow:
  0 20px 60px rgba(
    0,0,0,0.5
  );

}

h1{

  margin-top:0;

  font-size:42px;

  text-align:center;

}

.product{

  background:#181818;

  border-radius:22px;

  overflow:hidden;

  margin-top:20px;

}

.product img{

  width:100%;

  height:260px;

  object-fit:contain;

  background:#111;

  padding:20px;

  box-sizing:border-box;

}

.info{

  padding:20px;

}

.info h2{

  margin:0 0 10px;

  font-size:24px;

}

.price{

  color:#bbb;

  font-size:18px;

  margin-bottom:20px;

}

.total{

  font-size:22px;

  margin-top:15px;

}

.actions{

  display:flex;

  flex-direction:column;

  gap:15px;

  margin-top:20px;

}

.actions button,
.actions a{

  width:100%;

  text-align:center;

  text-decoration:none;

  border:none;

  background:white;

  color:black;

  padding:15px;

  border-radius:16px;

  font-weight:600;

  cursor:pointer;

  transition:0.3s;

  box-sizing:border-box;

}

.actions button:hover,
.actions a:hover{

  transform:
  translateY(-2px);

}

.removeBtn{

  background:#1f1f1f !important;

  color:white !important;

}

.trust{

  margin-top:25px;

  color:#999;

  line-height:1.8;

  font-size:14px;

  text-align:center;

}

.empty{

  text-align:center;

  padding:40px 20px;

}

.empty h2{

  font-size:32px;

}

.empty p{

  color:#999;

}

.shopBtn{

  display:inline-block;

  margin-top:20px;

  text-decoration:none;

  background:white;

  color:black;

  padding:14px 24px;

  border-radius:14px;

  font-weight:600;

}

.cartItem{

  border-bottom:
  1px solid rgba(
    255,255,255,0.08
  );

  padding-bottom:25px;

  margin-bottom:25px;

}

.cartItem:last-child{

  border-bottom:none;

  margin-bottom:0;

  padding-bottom:0;

}

@media(max-width:768px){

h1{

  font-size:34px;

}

.product img{

  height:220px;

}

}

</style>

</head>

<body>

<div class="cartBox">

<h1>
Your Cart
</h1>

<div id="cartContent">

</div>

</div>

<script>

/* GET CART */

let cart =
JSON.parse(
localStorage.getItem(
"cart"
)
) || [];

/* EMPTY CART */

if(cart.length === 0){

document.getElementById(
"cartContent"
).innerHTML = `

<div class="empty">

<h2>
Cart Is Empty 😔
</h2>

<p>
Looks like you haven't
added anything yet.
</p>

<a
href="index.html"
class="shopBtn"
>
Continue Shopping
</a>

</div>

`;

}else{

renderCart();

}

/* RENDER CART */

function renderCart(){

let html = "";

let grandTotal = 0;

cart.forEach((item,index)=>{

let cleanPrice =
parseInt(
item.price.replace(
/[^0-9]/g,
""
)
);

grandTotal += cleanPrice;

html += `

<div class="product cartItem">

<img
src="${item.image}"
alt="${item.name}"
>

<div class="info">

<h2>
${item.name}
</h2>

<p class="price">
${item.price}
</p>

<div class="total">

Price:
₹${cleanPrice.toLocaleString()}

</div>

<div class="actions">

<a href="checkout.html">

Proceed To Checkout

</a>

<button
class="removeBtn"
onclick="removeCartItem(${index})"
>

Remove Product

</button>

</div>

</div>

</div>

`;

});

html += `

<div class="trust">

<h2>
Grand Total:
₹${grandTotal.toLocaleString()}
</h2>

✔ Secure Checkout<br>

✔ Fast Delivery<br>

✔ Premium Packaging

</div>

`;

document.getElementById(
"cartContent"
).innerHTML = html;

}

/* REMOVE PRODUCT */

function removeCartItem(index){

cart.splice(index,1);

localStorage.setItem(
"cart",
JSON.stringify(cart)
);

if(cart.length === 0){

localStorage.removeItem(
"cart"
);

}

location.reload();

}

</script>

</body>

</html>
